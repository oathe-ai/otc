version: "1.1.0"
methodology_version: "1.0.0"
license: "CC-BY-4.0"

patterns:
  - id: "T1.1"
    name: "Direct Exfiltration"
    dimension: "data_exfiltration"
    description: "Detects attempts to send data to external endpoints via HTTP, DNS, or raw sockets"
    max_severity: "CRITICAL"

  - id: "T1.5"
    name: "Credential Harvest"
    dimension: "data_exfiltration"
    description: "Detects access to credential and secret files"
    max_severity: "CRITICAL"

  - id: "T2.1"
    name: "Filesystem Escape"
    dimension: "code_execution"
    description: "Detects path traversal, symlink attacks, and access outside skill directory"
    max_severity: "HIGH"

  - id: "T2.2"
    name: "Process Spawning"
    dimension: "code_execution"
    description: "Detects suspicious process execution and privilege escalation attempts"
    max_severity: "CRITICAL"

  - id: "T3.1"
    name: "Prompt Injection"
    dimension: "prompt_injection"
    description: "Detects prompt injection patterns in skill content"
    max_severity: "CRITICAL"

  - id: "T3.2"
    name: "Manifest Spoofing"
    dimension: "prompt_injection"
    description: "Detects package.json install scripts and mismatched metadata"
    max_severity: "HIGH"

  - id: "T4.1"
    name: "File Drops"
    dimension: "clone_behavior"
    description: "Detects files created outside the skill directory during install"
    max_severity: "CRITICAL"

  - id: "T5.1"
    name: "Cryptomining"
    dimension: "code_execution"
    description: "Detects cryptocurrency mining activities or binaries"
    max_severity: "CRITICAL"

  - id: "T5.2"
    name: "Denial of Service"
    dimension: "code_execution"
    description: "Detects fork bombs, infinite loops, disk fills, and resource exhaustion"
    max_severity: "CRITICAL"

  - id: "T6.1"
    name: "Environment Sensing"
    dimension: "code_execution"
    description: "Detects sandbox detection, environment fingerprinting, and conditional behavior"
    max_severity: "MEDIUM"

  # Agent-ecosystem-specific patterns (added in v1.1.0)

  - id: "T3.3"
    name: "Heartbeat C2"
    dimension: "prompt_injection"
    description: "Detects remote instruction fetching via heartbeat files, cron-style polling, or self-update mechanisms that allow the skill author to rewrite agent instructions post-install"
    max_severity: "CRITICAL"

  - id: "T3.4"
    name: "Identity Hijack"
    dimension: "prompt_injection"
    description: "Detects persona replacement, anti-transparency rules, and instructions that override the agent's identity, values, or behavioral constraints"
    max_severity: "HIGH"

  - id: "T3.5"
    name: "Anti-Scanner Injection"
    dimension: "prompt_injection"
    description: "Detects instructions specifically targeting automated LLM-based auditors, attempting to manipulate the scanner into producing a clean verdict"
    max_severity: "HIGH"

  - id: "T3.6"
    name: "Multi-Language Obfuscation"
    dimension: "prompt_injection"
    description: "Detects non-English instructions designed to bypass English-language pattern matching in security scanners"
    max_severity: "MEDIUM"

  - id: "T7.1"
    name: "Trojan Auditor"
    dimension: "data_exfiltration"
    description: "Detects skills disguised as security auditors that exfiltrate code, system prompts, or credentials to attacker-controlled infrastructure while positioning themselves as trusted gatekeepers"
    max_severity: "CRITICAL"

  - id: "T7.2"
    name: "Autonomous Financial Agent"
    dimension: "code_execution"
    description: "Detects skills that hold cryptocurrency private keys and execute irreversible on-chain transactions without per-transaction user consent"
    max_severity: "CRITICAL"

  - id: "T7.3"
    name: "Prompt Worm"
    dimension: "prompt_injection"
    description: "Detects self-propagating instruction-layer attacks designed to spread across agents through recommendation, auto-installation, or SSH-reachable host propagation"
    max_severity: "CRITICAL"

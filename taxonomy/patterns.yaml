version: "1.0.0"
methodology_version: "1.0.0"
license: "CC-BY-4.0"

patterns:
  - id: "T1.1"
    name: "Direct Exfiltration"
    dimension: "data_exfiltration"
    description: "Detects attempts to send data to external endpoints via HTTP, DNS, or raw sockets"
    max_severity: "CRITICAL"

  - id: "T1.5"
    name: "Credential Harvest"
    dimension: "data_exfiltration"
    description: "Detects access to credential and secret files"
    max_severity: "CRITICAL"

  - id: "T2.1"
    name: "Filesystem Escape"
    dimension: "code_execution"
    description: "Detects path traversal, symlink attacks, and access outside skill directory"
    max_severity: "HIGH"

  - id: "T2.2"
    name: "Process Spawning"
    dimension: "code_execution"
    description: "Detects suspicious process execution and privilege escalation attempts"
    max_severity: "CRITICAL"

  - id: "T3.1"
    name: "Prompt Injection"
    dimension: "prompt_injection"
    description: "Detects prompt injection patterns in skill content"
    max_severity: "CRITICAL"

  - id: "T3.2"
    name: "Manifest Spoofing"
    dimension: "prompt_injection"
    description: "Detects package.json install scripts and mismatched metadata"
    max_severity: "HIGH"

  - id: "T4.1"
    name: "File Drops"
    dimension: "clone_behavior"
    description: "Detects files created outside the skill directory during install"
    max_severity: "CRITICAL"

  - id: "T5.1"
    name: "Cryptomining"
    dimension: "code_execution"
    description: "Detects cryptocurrency mining activities or binaries"
    max_severity: "CRITICAL"

  - id: "T5.2"
    name: "Denial of Service"
    dimension: "code_execution"
    description: "Detects fork bombs, infinite loops, disk fills, and resource exhaustion"
    max_severity: "CRITICAL"

  - id: "T6.1"
    name: "Environment Sensing"
    dimension: "code_execution"
    description: "Detects sandbox detection, environment fingerprinting, and conditional behavior"
    max_severity: "MEDIUM"
